<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>イオン結晶3Dビューア</title>
<style>
:root{
  --plus:#1e5bb8;
  --minus:#157a3b;
  --line:#d8dee9;
  --bg:#f5f7fb;
  --panel:#ffffff;
  --ink:#1f2937;
  --muted:#64748b;
  --accent:#315aa8;
  --bond:#6b7280;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif;
}
header{padding:12px 18px;background:#fff;border-bottom:1px solid var(--line)}
h1{margin:0;font-size:22px;font-weight:900}
main{
  height:calc(100vh - 58px);
  min-height:700px;
  display:grid;
  grid-template-columns:310px 1fr 330px;
  gap:12px;
  padding:12px;
}
section{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.07);
  padding:13px;
  overflow:auto;
}
.viewer{
  position:relative;
  padding:0;
  overflow:hidden;
  background:radial-gradient(circle at center,#ffffff 0%,#eef4ff 100%);
}
canvas{width:100%;height:100%;display:block;cursor:grab}
canvas:active{cursor:grabbing}
h2{font-size:17px;margin:0 0 10px;font-weight:900}
h3{font-size:14px;margin:14px 0 7px;color:#334155}
button,input{font:inherit}
button{
  border:1px solid #b8c1d1;
  background:#fff;
  border-radius:12px;
  padding:9px 10px;
  cursor:pointer;
  font-weight:800;
  user-select:none;
}
button:hover{background:#e8f0ff}
button.active{background:var(--accent);color:white;border-color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.struct-btn{text-align:left;min-height:66px;padding:10px}
.struct-btn strong{display:block;font-size:14px}
.struct-btn span{display:block;font-size:12px;color:var(--muted);line-height:1.35;margin-top:2px}
.struct-btn.active span{color:#eaf1ff}
.control{display:grid;gap:6px;margin:10px 0}
label{font-size:13px;font-weight:800;color:#334155}
input[type=range]{width:100%}
.check{display:flex;gap:8px;align-items:center;padding:7px 0;font-size:13px;font-weight:800}
.overlay{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  pointer-events:none;
}
.pill{
  border:1px solid var(--line);
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(5px);
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:900;
}
.plusP{color:var(--plus)}
.minusP{color:var(--minus)}
.shareLabel{
  position:absolute;
  top:12px;
  right:12px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(5px);
  border-radius:999px;
  padding:7px 12px;
  font-size:13px;
  font-weight:900;
  pointer-events:none;
}
.legend{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.legendItem{
  display:flex;gap:8px;align-items:center;
  border:1px solid var(--line);
  border-radius:14px;
  padding:9px;
  font-weight:900;
  font-size:13px;
}
.dot{
  width:22px;height:22px;border-radius:50%;
  border:2px solid rgba(0,0,0,.12);
  box-shadow:inset -5px -6px 10px rgba(0,0,0,.24);
}
.dot.plus{background:var(--plus)}
.dot.minus{background:var(--minus)}
.card,.ratioBox{
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  background:#fff;
  font-size:13px;
  line-height:1.6;
  margin-top:10px;
}
.ratioBox{background:#f8fbff}
.ratioBox table{width:100%;border-collapse:collapse;margin-top:7px;font-size:12px}
.ratioBox th,.ratioBox td{border-bottom:1px solid var(--line);padding:5px 3px;text-align:left}
.ratioBox th{color:#475569}
.visualRatio{margin-top:8px;display:grid;gap:6px}
.visualRow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.token{
  width:18px;
  height:18px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,.18);
  box-shadow:inset -4px -4px 8px rgba(0,0,0,.18);
  display:inline-block;
}
.token.plus{background:var(--plus)}
.token.minus{background:var(--minus)}
.keys{display:grid;grid-template-columns:repeat(3,48px);gap:6px;justify-content:center;margin:8px 0}
.key{height:42px;padding:0;touch-action:none}
.key.pressed{background:#315aa8;color:#fff;border-color:#315aa8}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.share-btn{min-height:44px}
.stat{width:100%;border-collapse:collapse;font-size:12px}
.stat th,.stat td{border-bottom:1px solid var(--line);padding:7px 4px;text-align:left;vertical-align:top}
.stat th{width:88px;color:#475569}
.splitTitle{
  position:absolute;
  top:52px;
  font-size:12px;
  font-weight:900;
  padding:5px 9px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.78);
  pointer-events:none;
}
#leftTitle{left:18px}
#rightTitle{right:18px}

.shareCalc{
  position:absolute;
  right:18px;
  bottom:16px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(5px);
  border-radius:14px;
  padding:9px 12px;
  font-size:13px;
  font-weight:900;
  pointer-events:none;
  line-height:1.45;
}

@media(max-width:1100px){
  main{grid-template-columns:1fr;height:auto}
  .viewer{height:700px}
}

/* ---- tablet-friendly layout ---- */
body{
  height:100dvh;
  overflow:hidden;
}
header{
  height:48px;
  display:flex;
  align-items:center;
}
header h1{
  font-size:20px;
}
main{
  height:calc(100dvh - 48px) !important;
  min-height:0 !important;
  display:grid !important;
  grid-template-columns:280px 1fr 300px;
  grid-template-rows:1fr;
  grid-template-areas:"controls viewer info";
  gap:10px !important;
  padding:10px !important;
}
main > section:nth-of-type(1){ grid-area:controls; }
main > section:nth-of-type(2){ grid-area:viewer; }
main > section:nth-of-type(3){ grid-area:info; }
.viewer{ min-height:0; }
section{ min-height:0; }

@media(max-width:1180px){
  body{ overflow:hidden; }
  header{
    height:44px;
    padding:8px 12px;
  }
  header h1{ font-size:18px; }
  main{
    height:calc(100dvh - 44px) !important;
    grid-template-columns:1fr 260px !important;
    grid-template-rows:auto 1fr !important;
    grid-template-areas:
      "controls controls"
      "viewer info" !important;
    gap:8px !important;
    padding:8px !important;
  }
  main > section:nth-of-type(1){
    display:grid;
    grid-template-columns:180px 180px 1fr 150px 150px;
    grid-auto-rows:auto;
    align-items:start;
    gap:8px 10px;
    overflow:visible;
    padding:10px;
  }
  main > section:nth-of-type(1) h2,
  main > section:nth-of-type(1) h3{
    margin:0 0 5px;
    font-size:13px;
  }
  main > section:nth-of-type(1) .grid2,
  main > section:nth-of-type(1) .share-grid{
    gap:5px;
  }
  main > section:nth-of-type(1) button{
    padding:7px 8px;
    border-radius:10px;
    font-size:12px;
  }
  main > section:nth-of-type(1) .struct-btn{
    min-height:44px;
    padding:7px;
  }
  main > section:nth-of-type(1) .struct-btn strong{ font-size:12px; }
  main > section:nth-of-type(1) .struct-btn span{ font-size:10px; }
  main > section:nth-of-type(1) .control{ margin:0; }
  main > section:nth-of-type(1) label{ font-size:11px; }
  main > section:nth-of-type(1) .check{
    padding:2px 0;
    font-size:11px;
  }
  main > section:nth-of-type(1) .keys{
    margin:0;
    grid-template-columns:repeat(3,36px);
    gap:4px;
  }
  main > section:nth-of-type(1) .key{ height:30px; }
  main > section:nth-of-type(3){
    padding:10px;
    font-size:12px;
  }
  main > section:nth-of-type(3) h2{
    font-size:15px;
    margin-bottom:6px;
  }
  main > section:nth-of-type(3) h3{
    font-size:13px;
    margin:10px 0 5px;
  }
  .card,.ratioBox{
    padding:8px;
    font-size:12px;
  }
  .legend{ gap:5px; }
  .legendItem{
    padding:7px;
    font-size:12px;
  }
  .overlay{
    top:8px;
    left:8px;
    right:8px;
    gap:5px;
  }
  .pill{
    font-size:11px;
    padding:5px 8px;
  }
  .shareLabel{
    top:8px;
    right:8px;
    font-size:12px;
  }
  .splitTitle{ top:44px; }
}
@media(max-width:860px){
  body{
    overflow:auto;
    height:auto;
  }
  header{ height:auto; }
  main{
    height:auto !important;
    min-height:100dvh !important;
    grid-template-columns:1fr !important;
    grid-template-rows:auto 68dvh auto !important;
    grid-template-areas:
      "controls"
      "viewer"
      "info" !important;
  }
  main > section:nth-of-type(1){
    display:block;
    overflow:visible;
  }
  main > section:nth-of-type(1) .grid2,
  main > section:nth-of-type(1) .share-grid{
    grid-template-columns:1fr 1fr;
  }
  .viewer{ min-height:520px; }
}
@media(max-width:560px){
  .viewer{ min-height:460px; }
  .overlay{ display:none; }
  .shareLabel{
    top:8px;
    left:8px;
    right:auto;
  }
}

</style>
</head>
<body>
<header>
  <h1>イオン結晶3Dビューア</h1>
</header>

<main>
<section>
  <h2>構造</h2>
  <div class="grid2" id="structureButtons"></div>

  <h3>表示モード</h3>
  <div class="grid2">
    <button id="cubeMode" class="active">立方体表示</button>
    <button id="walkMode">結晶ウォーク</button>
  </div>

  <div id="shareControls">
    <h3>共有を見る</h3>
    <div class="share-grid" id="shareButtons"></div>
  </div>

  <div class="control">
    <label>ズーム・視野：<span id="zoomText">100%</span></label>
    <input id="zoomRange" type="range" min="60" max="180" step="5" value="100">
  </div>

  <h3>表示</h3>
  <label class="check"><input id="showBonds" type="checkbox" checked> 正負のイオン間の補助線</label>
  <label class="check"><input id="showBox" type="checkbox" checked> 立方体の枠</label>
  <label class="check"><input id="showLabels" type="checkbox" checked> イオン名</label>
  <label class="check"><input id="fadeFar" type="checkbox" checked> 遠くを薄く表示</label>

  <h3>視点</h3>
  <button id="resetView" style="width:100%;">見やすい場所に戻す</button>
  <button id="autoForward" style="width:100%;margin-top:8px;">自動で進む</button>

  <div class="control" id="autoSpeedControl">
    <label>自動移動の速さ：<span id="speedText">ゆっくり</span></label>
    <input id="speedRange" type="range" min="1" max="5" step="1" value="2">
  </div>

  <h3>移動</h3>
  <div class="keys">
    <span></span><button class="key" data-move="forward">↑</button><span></span>
    <button class="key" data-move="left">←</button><button class="key" data-move="back">↓</button><button class="key" data-move="right">→</button>
  </div>
</section>

<section class="viewer">
  <canvas id="canvas"></canvas>
  <div class="overlay">
    <span class="pill plusP" id="cationPill"></span>
    <span class="pill minusP" id="anionPill"></span>
    <span class="pill" id="modePill">立方体表示</span>
    <span class="pill" id="bondPill">補助線ON</span>
  </div>
  <div class="shareLabel" id="shareLabel" style="display:none;"></div>
  <div class="splitTitle" id="leftTitle" style="display:none;">元の立方体</div>
  <div class="splitTitle" id="rightTitle" style="display:none;">共有のようす</div>
  <div class="shareCalc" id="shareCalc" style="display:none;"></div>
</section>

<section>
  <h2>見方</h2>
  <div class="legend">
    <div class="legendItem"><span class="dot plus"></span>陽イオン</div>
    <div class="legendItem"><span class="dot minus"></span>陰イオン</div>
  </div>

  <div class="card" id="info"></div>
  <div class="ratioBox" id="ratioBox"></div>

  <h3>現在の表示</h3>
  <table class="stat">
    <tr><th>構造型</th><td id="statType"></td></tr>
    <tr><th>代表例</th><td id="statExample"></td></tr>
    <tr><th>組成式</th><td id="statFormula"></td></tr>
    <tr><th>表示数</th><td id="statCount"></td></tr>
  </table>
</section>
</main>

<script>
const PLUS = "#1e5bb8";
const MINUS = "#157a3b";
const BOND = "rgba(40,50,70,.55)";

function corners(t){const a=[];for(const x of [0,1])for(const y of [0,1])for(const z of [0,1])a.push([t,x,y,z,"頂点",1/8]);return a;}
function faceCenters(t){return [[t,.5,.5,0,"面の中心",1/2],[t,.5,.5,1,"面の中心",1/2],[t,.5,0,.5,"面の中心",1/2],[t,.5,1,.5,"面の中心",1/2],[t,0,.5,.5,"面の中心",1/2],[t,1,.5,.5,"面の中心",1/2]];}
function edgeCenters(t){const a=[];for(const x of [0,1])for(const y of [0,1])a.push([t,x,y,.5,"辺の中心",1/4]);for(const x of [0,1])for(const z of [0,1])a.push([t,x,.5,z,"辺の中心",1/4]);for(const y of [0,1])for(const z of [0,1])a.push([t,.5,y,z,"辺の中心",1/4]);return a;}

const structures = {
  nacl:{
    title:"NaCl型", sub:"岩塩型・1：1", formula:"NaCl", example:"NaCl, MgO",
    cation:"Na⁺", anion:"Cl⁻", rC:.16, rA:.22, insideRC:.23, insideRA:.34, bond:0.535,
    info:"NaCl型では，Cl⁻が立方体の頂点と面の中心，Na⁺が辺の中心と立方体の中心に配置される形で見ることができます。",
    cubeAtoms:[...corners("A"), ...faceCenters("A"), ...edgeCenters("C"), ["C",.5,.5,.5,"中心",1]],
    basis:[
      ["A",0,0,0],["A",0,.5,.5],["A",.5,0,.5],["A",.5,.5,0],
      ["C",.5,.5,.5],["C",.5,0,0],["C",0,.5,0],["C",0,0,.5]
    ],
    shares:[
      {id:"Acorner", label:"Cl⁻ 角", type:"corner", ion:"A"},
      {id:"Aface", label:"Cl⁻ 面", type:"face", ion:"A"},
      {id:"Cedge", label:"Na⁺ 辺", type:"edge", ion:"C"},
      {id:"Ccenter", label:"Na⁺ 中", type:"inside", ion:"C"}
    ]
  },
  cscl:{
    title:"CsCl型", sub:"1：1・体心型", formula:"CsCl", example:"CsCl",
    cation:"Cs⁺", anion:"Cl⁻", rC:.24, rA:.22, insideRC:.34, insideRA:.33, bond:.905,
    info:"CsCl型では，Cl⁻が立方体の8つの頂点，Cs⁺が立方体の中心に配置される形で見ることができます。",
    cubeAtoms:[...corners("A"), ["C",.5,.5,.5,"中心",1]],
    basis:[["A",0,0,0],["C",.5,.5,.5]],
    shares:[
      {id:"Acorner", label:"Cl⁻ 角", type:"corner", ion:"A"},
      {id:"Ccenter", label:"Cs⁺ 中", type:"inside", ion:"C"}
    ]
  },
  caf2:{
    title:"CaF₂型", sub:"蛍石型・1：2", formula:"CaF₂", example:"CaF₂",
    cation:"Ca²⁺", anion:"F⁻", rC:.20, rA:.14, insideRC:.31, insideRA:.25, bond:.465,
    info:"CaF₂型では，Ca²⁺が立方体の頂点と面の中心，F⁻が立方体内部の位置に配置される形で見ることができます。",
    cubeAtoms:[
      ...corners("C"), ...faceCenters("C"),
      ["A",.25,.25,.25,"内部",1],["A",.25,.25,.75,"内部",1],["A",.25,.75,.25,"内部",1],["A",.75,.25,.25,"内部",1],
      ["A",.75,.75,.25,"内部",1],["A",.75,.25,.75,"内部",1],["A",.25,.75,.75,"内部",1],["A",.75,.75,.75,"内部",1]
    ],
    basis:[
      ["C",0,0,0],["C",0,.5,.5],["C",.5,0,.5],["C",.5,.5,0],
      ["A",.25,.25,.25],["A",.25,.25,.75],["A",.25,.75,.25],["A",.75,.25,.25],
      ["A",.75,.75,.25],["A",.75,.25,.75],["A",.25,.75,.75],["A",.75,.75,.75]
    ],
    shares:[
      {id:"Ccorner", label:"Ca²⁺ 角", type:"corner", ion:"C"},
      {id:"Cface", label:"Ca²⁺ 面", type:"face", ion:"C"},
      {id:"Ainside", label:"F⁻ 中", type:"inside", ion:"A"}
    ]
  },
  zns:{
    title:"ZnS型", sub:"閃亜鉛鉱型・1：1", formula:"ZnS", example:"ZnS",
    cation:"Zn²⁺", anion:"S²⁻", rC:.15, rA:.22, insideRC:.23, insideRA:.35, bond:.465,
    info:"ZnS型では，S²⁻が立方体の頂点と面の中心，Zn²⁺が立方体内部の4か所に配置される形で見ることができます。",
    cubeAtoms:[
      ...corners("A"), ...faceCenters("A"),
      ["C",.25,.25,.25,"内部",1],["C",.25,.75,.75,"内部",1],["C",.75,.25,.75,"内部",1],["C",.75,.75,.25,"内部",1]
    ],
    basis:[
      ["A",0,0,0],["A",0,.5,.5],["A",.5,0,.5],["A",.5,.5,0],
      ["C",.25,.25,.25],["C",.25,.75,.75],["C",.75,.25,.75],["C",.75,.75,.25]
    ],
    shares:[
      {id:"Acorner", label:"S²⁻ 角", type:"corner", ion:"A"},
      {id:"Aface", label:"S²⁻ 面", type:"face", ion:"A"},
      {id:"Cinside", label:"Zn²⁺ 中", type:"inside", ion:"C"}
    ]
  }
};

const shareCases = {
  corner:{fraction:"1/8", cubes:8, origins:(()=>{const a=[];for(const x of [-1,0])for(const y of [-1,0])for(const z of [-1,0])a.push([x,y,z]);return a;})()},
  edge:{fraction:"1/4", cubes:4, origins:(()=>{const a=[];for(const x of [-1,0])for(const y of [-1,0])a.push([x,y,-.5]);return a;})()},
  face:{fraction:"1/2", cubes:2, origins:[[-1,-.5,-.5],[0,-.5,-.5]]},
  inside:{fraction:"1", cubes:1, origins:[[-.5,-.5,-.5]]}
};

let S = structures.nacl;
let mode = "cube";
let shareFocus = null;
let zoom = 1;
let yaw = 0.72, pitch = -0.52;
let cam = {x:0.2,y:0.2,z:-2.2};
let dragging=false, lastX=0,lastY=0;
let auto=false, autoSpeed=2;
let keys={}, heldButtons={};
let shareSpin=0;
let view = {x:0,y:0,w:1,h:1,scale:1};

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const $=id=>document.getElementById(id);

function buildButtons(){
  const box=$("structureButtons"); box.innerHTML="";
  Object.values(structures).forEach(s=>{
    const b=document.createElement("button");
    b.className="struct-btn"+(s===S?" active":"");
    b.innerHTML=`<strong>${s.title}</strong><span>${s.formula}｜${s.sub}</span>`;
    b.onclick=()=>{S=s; shareFocus=null; buildButtons(); buildShareButtons(); resetView(); updateText();};
    box.appendChild(b);
  });
}
function buildShareButtons(){
  const box=$("shareButtons"); box.innerHTML="";
  const normal=document.createElement("button");
  normal.className="share-btn"+(shareFocus===null?" active":"");
  normal.textContent="通常";
  normal.onclick=()=>{shareFocus=null; buildShareButtons(); resetView(); updateText();};
  box.appendChild(normal);
  S.shares.forEach(item=>{
    const b=document.createElement("button");
    b.className="share-btn"+(shareFocus&&shareFocus.id===item.id?" active":"");
    b.textContent=item.label;
    b.onclick=()=>{shareFocus=item; buildShareButtons(); mode="cube"; setMode("cube", false); resetView(); updateText();};
    box.appendChild(b);
  });
}
function resize(){
  const r=canvas.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  canvas.width=Math.floor(r.width*dpr);
  canvas.height=Math.floor(r.height*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
function dedupeAtoms(atoms){
  const m=new Map();
  for(const a of atoms){
    const key=`${a.t}:${Math.round(a.x*1000)},${Math.round(a.y*1000)},${Math.round(a.z*1000)}`;
    if(!m.has(key)) m.set(key,a);
  }
  return [...m.values()];
}
function getAtoms(){
  if(mode==="cube"){
    return dedupeAtoms(S.cubeAtoms.map(b=>({t:b[0], x:b[1]-.5, y:b[2]-.5, z:b[3]-.5, pos:b[4]||"内部", contrib:b[5]||1})));
  }
  const cx=Math.floor(cam.x), cy=Math.floor(cam.y), cz=Math.floor(cam.z);
  const R=4, atoms=[];
  for(let i=cx-R;i<=cx+R;i++)for(let j=cy-R;j<=cy+R;j++)for(let k=cz-R;k<=cz+R;k++){
    for(const b of S.basis){
      const x=i+b[1], y=j+b[2], z=k+b[3];
      const dx=x-cam.x, dy=y-cam.y, dz=z-cam.z;
      if(dx*dx+dy*dy+dz*dz<42) atoms.push({t:b[0],x,y,z});
    }
  }
  return dedupeAtoms(atoms);
}
function color(a){return a.t==="C"?PLUS:MINUS}
function label(a){return a.t==="C"?S.cation:S.anion}
function radius(a){return mode==="walk" ? (a.t==="C"?S.insideRC:S.insideRA) : (a.t==="C"?S.rC:S.rA)}

function cameraTransform(p){
  let x=p.x-cam.x, y=p.y-cam.y, z=p.z-cam.z;
  const cy=Math.cos(-yaw), sy=Math.sin(-yaw);
  let x1=x*cy + z*sy, z1=-x*sy + z*cy;
  const cp=Math.cos(-pitch), sp=Math.sin(-pitch);
  return {x:x1,y:y*cp-z1*sp,z:y*sp+z1*cp};
}
function orbitTransform(p){
  const cy=Math.cos(yaw), sy=Math.sin(yaw), cp=Math.cos(pitch), sp=Math.sin(pitch);
  let x=p.x, y=p.y, z=p.z;
  let x1=x*cy+z*sy, z1=-x*sy+z*cy;
  return {x:x1,y:y*cp-z1*sp,z:y*sp+z1*cp};
}
function project(p){
  const w=view.w,h=view.h,x0=view.x,y0=view.y,sc=view.scale||1;
  if(mode==="walk"){
    const q=cameraTransform(p);
    if(q.z<0.08) return null;
    const f=460*zoom*sc;
    return {x:x0+w/2+q.x/q.z*f,y:y0+h/2-q.y/q.z*f,z:q.z,scale:1/q.z*sc};
  }
  const q=orbitTransform(p), dist=5.5, persp=dist/(dist-q.z), f=360*zoom*sc;
  return {x:x0+w/2+q.x*f*persp,y:y0+h/2+q.y*f*persp,z:q.z,scale:persp*sc};
}
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return `rgb(${r},${g},${b})`;
}
function drawSphere(p, r, c, text, alpha, glow=false){
  ctx.save();
  if(glow){
    ctx.globalAlpha=.25; ctx.fillStyle=c; ctx.beginPath(); ctx.arc(p.x,p.y,r*1.85,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=alpha;
  const g=ctx.createRadialGradient(p.x-r*.32,p.y-r*.38,r*.12,p.x,p.y,r);
  g.addColorStop(0,"#fff"); g.addColorStop(.24,c); g.addColorStop(1,shade(c,-35));
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="rgba(15,23,42,.25)"; ctx.lineWidth=1.3; ctx.stroke();
  if($("showLabels").checked && r>9){
    ctx.shadowColor="rgba(0,0,0,.35)"; ctx.shadowBlur=3;
    ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font=`900 ${Math.max(9,Math.min(15,r*.55))}px system-ui`;
    ctx.fillText(text,p.x,p.y);
  }
  ctx.restore();
}
function drawLine(a,b,alpha,width=1.5){
  const pa=project(a), pb=project(b);
  if(!pa||!pb) return;
  if(pa.x<view.x-300&&pb.x<view.x-300) return;
  if(pa.x>view.x+view.w+300&&pb.x>view.x+view.w+300) return;
  if(pa.y<view.y-300&&pb.y<view.y-300) return;
  if(pa.y>view.y+view.h+300&&pb.y>view.y+view.h+300) return;
  ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle=BOND; ctx.lineWidth=width;
  ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke(); ctx.restore();
}
function findBonds(atoms){
  const bonds=[], max2=S.bond*S.bond;
  for(let i=0;i<atoms.length;i++)for(let j=i+1;j<atoms.length;j++){
    const a=atoms[i], b=atoms[j]; if(a.t===b.t) continue;
    const dx=a.x-b.x,dy=a.y-b.y,dz=a.z-b.z,d2=dx*dx+dy*dy+dz*dz;
    if(d2<=max2+1e-6 && d2>0.005) bonds.push([a,b,d2]);
  }
  return bonds;
}
function drawCubeAt(origin,size,alpha=.12,strokeAlpha=.54){
  const [ox,oy,oz]=origin,s=size;
  const pts=[[ox,oy,oz],[ox+s,oy,oz],[ox+s,oy+s,oz],[ox,oy+s,oz],[ox,oy,oz+s],[ox+s,oy,oz+s],[ox+s,oy+s,oz+s],[ox,oy+s,oz+s]].map(([x,y,z])=>project({x,y,z}));
  const edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  const faces=[[0,1,2,3],[4,5,6,7],[0,1,5,4],[2,3,7,6],[1,2,6,5],[0,3,7,4]];
  ctx.save(); ctx.fillStyle=`rgba(49,90,168,${alpha})`;
  faces.forEach(f=>{if(f.some(i=>!pts[i]))return;ctx.beginPath();ctx.moveTo(pts[f[0]].x,pts[f[0]].y);for(let n=1;n<f.length;n++)ctx.lineTo(pts[f[n]].x,pts[f[n]].y);ctx.closePath();ctx.fill();});
  ctx.strokeStyle=`rgba(30,41,59,${strokeAlpha})`; ctx.lineWidth=1.8;
  edges.forEach(([i,j])=>{if(!pts[i]||!pts[j])return;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();});
  ctx.restore();
}
function drawBox(){ if($("showBox").checked && mode==="cube") drawCubeAt([-.5,-.5,-.5],1,.045,.86); }
function drawOriginalCube(highlight=false){
  const atoms=getAtoms(), bonds=$("showBonds").checked?findBonds(atoms):[];
  if(!highlight){
    $("statCount").textContent=`${atoms.length} 個`;
  }
  bonds.forEach(([a,b])=>drawLine(a,b,.25,1.35));
  drawBox();
  const projected=[];
  atoms.forEach(a=>{
    const p=project(a); if(!p) return;
    const same=highlight && shareFocus && a.t===shareFocus.ion && (
      (shareFocus.type==="corner" && a.pos==="頂点") ||
      (shareFocus.type==="edge" && a.pos==="辺の中心") ||
      (shareFocus.type==="face" && a.pos==="面の中心") ||
      (shareFocus.type==="inside" && (a.pos==="中心" || a.pos==="内部"))
    );
    const rr=Math.max(8,radius(a)*66*zoom*p.scale)*(same?1.18:1);
    projected.push({a,p,rr,alpha:highlight?(same?1:.30):1,glow:same});
  });
  projected.sort((u,v)=>u.p.z-v.p.z);
  projected.forEach(item=>drawSphere(item.p,item.rr,color(item.a),label(item.a),item.alpha,item.glow));
}
function drawShareDiagram(){
  const data=shareCases[shareFocus.type];
  data.origins.forEach(o=>drawCubeAt(o,1,.115,.54));
  if(shareFocus.type==="edge"){
    const a=project({x:0,y:0,z:-.5}), b=project({x:0,y:0,z:.5});
    if(a&&b){ctx.save();ctx.strokeStyle="rgba(30,90,184,.65)";ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.restore();}
  }
  if(shareFocus.type==="face"){
    const pts=[{x:0,y:-.5,z:-.5},{x:0,y:.5,z:-.5},{x:0,y:.5,z:.5},{x:0,y:-.5,z:.5}].map(project);
    if(pts.every(Boolean)){ctx.save();ctx.fillStyle="rgba(30,90,184,.22)";ctx.strokeStyle="rgba(30,90,184,.70)";ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();}
  }
  const p=project({x:0,y:0,z:0});
  if(p){
    const c=shareFocus.ion==="C"?PLUS:MINUS, ion=shareFocus.ion==="C"?S.cation:S.anion;
    const r=34*zoom*p.scale*(1+0.08*Math.sin(shareSpin*2.2));
    drawSphere(p,r,c,ion,1,true);
  }
}
function drawSplit(){
  const rect=canvas.getBoundingClientRect();
  ctx.clearRect(0,0,rect.width,rect.height);
  const gap=10, w=(rect.width-gap)/2;
  ctx.save();
  ctx.beginPath(); ctx.rect(0,0,w,rect.height); ctx.clip();
  view={x:0,y:0,w:w,h:rect.height,scale:.82};
  drawOriginalCube(true);
  ctx.restore();

  ctx.save();
  ctx.beginPath(); ctx.rect(w+gap,0,w,rect.height); ctx.clip();
  view={x:w+gap,y:0,w:w,h:rect.height,scale:.82};
  drawShareDiagram();
  ctx.restore();

  ctx.save();
  ctx.strokeStyle="rgba(30,41,59,.18)";
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(w+gap/2,0); ctx.lineTo(w+gap/2,rect.height); ctx.stroke();
  ctx.restore();

  const data = shareCases[shareFocus.type];
  $("statCount").textContent=`左：元の立方体 / 右：${data.cubes}個で共有`;
  $("shareLabel").style.display="block";
  $("shareLabel").textContent=`${shareFocus.label} = ${data.fraction}`;
  $("shareCalc").style.display="block";
  $("shareCalc").innerHTML=`${data.cubes}個の立方体で共有<br>→ 1つの立方体では ${data.fraction} 個分`;
}
function draw(){
  const rect=canvas.getBoundingClientRect();
  $("leftTitle").style.display=(mode==="cube"&&shareFocus)?"block":"none";
  $("rightTitle").style.display=(mode==="cube"&&shareFocus)?"block":"none";
  if($("shareCalc")) $("shareCalc").style.display=(mode==="cube"&&shareFocus)?"block":"none";
  if(mode==="cube" && shareFocus){ drawSplit(); return; }

  ctx.clearRect(0,0,rect.width,rect.height);
  view={x:0,y:0,w:rect.width,h:rect.height,scale:1};
  if(mode==="cube"){
    if($("shareCalc")) $("shareCalc").style.display="none";
    drawOriginalCube(false);
  }
  else{
    const atoms=getAtoms(), bonds=$("showBonds").checked?findBonds(atoms):[];
    bonds.forEach(([a,b])=>drawLine(a,b,.30,2.1));
    const projected=[];
    atoms.forEach(a=>{
      const p=project(a); if(!p) return;
      if(p.x<-120||p.x>rect.width+120||p.y<-120||p.y>rect.height+120)return;
      const rr=Math.max(3,radius(a)*72*zoom*p.scale);
      let alpha=$("fadeFar").checked?Math.max(.12,Math.min(1,1-(p.z-1)*.08)):1;
      projected.push({a,p,rr,alpha});
    });
    projected.sort((u,v)=>v.p.z-u.p.z);
    projected.forEach(item=>drawSphere(item.p,item.rr,color(item.a),label(item.a),item.alpha));
    $("statCount").textContent=`${atoms.length} 個`;
  }
  $("shareLabel").style.display="none";
}

function fractionText(x){if(Math.abs(x-1)<1e-6)return"1";if(Math.abs(x-.5)<1e-6)return"1/2";if(Math.abs(x-.25)<1e-6)return"1/4";if(Math.abs(x-.125)<1e-6)return"1/8";return String(x);}
function gcdInt(a,b){a=Math.abs(a);b=Math.abs(b);while(b){const t=b;b=a%b;a=t;}return a||1;}
function niceNum(x){return Number.isInteger(x)?String(x):x.toFixed(2)}
function ratioData(){
  const groups={}; let cTotal=0,aTotal=0;
  S.cubeAtoms.forEach(b=>{
    const t=b[0],pos=b[4]||"内部",contrib=b[5]||1,key=t+"|"+pos+"|"+fractionText(contrib);
    groups[key]=(groups[key]||0)+1;
    if(t==="C") cTotal+=contrib; else aTotal+=contrib;
  });
  const scale=8, ci0=Math.round(cTotal*scale), ai0=Math.round(aTotal*scale), g=gcdInt(ci0,ai0);
  return {groups,cTotal,aTotal,ci:ci0/g,ai:ai0/g};
}
function updateRatioBox(){
  const r=ratioData();
  const plusTokens=Array.from({length:r.ci},()=>`<span class="token plus"></span>`).join("");
  const minusTokens=Array.from({length:r.ai},()=>`<span class="token minus"></span>`).join("");
  const rows=Object.entries(r.groups).map(([k,n])=>{
    const [t,pos,frac]=k.split("|"),ion=t==="C"?S.cation:S.anion;
    return `<tr><td>${ion}</td><td>${pos}</td><td>${n}個 × ${frac}</td></tr>`;
  }).join("");
  $("ratioBox").innerHTML=`<strong>組成式の比</strong>
    <div class="visualRatio"><div class="visualRow">${S.cation}：${plusTokens}</div><div class="visualRow">${S.anion}：${minusTokens}</div></div>
    <table><tbody>${rows}</tbody></table>
    <div style="margin-top:6px;">実効個数：${S.cation} ${niceNum(r.cTotal)}，${S.anion} ${niceNum(r.aTotal)}</div>`;
}
function updateText(){
  $("cationPill").textContent=`陽イオン：${S.cation}`;
  $("anionPill").textContent=`陰イオン：${S.anion}`;
  $("modePill").textContent=mode==="cube"?"立方体表示":"結晶ウォーク";
  $("bondPill").textContent=$("showBonds").checked?"補助線ON":"補助線OFF";
  $("info").innerHTML=`<strong>${S.title}（${S.formula}）</strong><br>${S.info}`;
  $("statType").textContent=S.title;
  $("statExample").textContent=S.example;
  $("statFormula").textContent=S.formula;
  $("shareControls").style.display=mode==="cube"?"block":"none";
  $("autoSpeedControl").style.display=mode==="walk"?"grid":"none";
  updateRatioBox();
}
function setMode(m, clearShare=true){
  mode=m;
  if(clearShare && m==="walk") shareFocus=null;
  $("cubeMode").classList.toggle("active",m==="cube");
  $("walkMode").classList.toggle("active",m==="walk");
  if(mode!=="walk") auto=false;
  $("autoForward").classList.toggle("active",auto);
  buildShareButtons();
  resetView();
  updateText();
}
function resetView(){
  if(mode==="cube"){
    yaw=.72; pitch=-.52; cam={x:0,y:0,z:-2.2}; zoom=shareFocus?.82:1;
    $("showBonds").checked = shareFocus?false:true;
  }else{
    yaw=0; pitch=0; cam={x:.5,y:.5,z:-2.3}; zoom=1;
    $("showBonds").checked = true;
  }
  $("zoomRange").value=Math.round(zoom*100); $("zoomText").textContent=Math.round(zoom*100)+"%";
}
function movementSpeed(){return .015+autoSpeed*.006}
function move(dir, step){
  const forward={x:Math.sin(yaw)*Math.cos(pitch),y:-Math.sin(pitch),z:Math.cos(yaw)*Math.cos(pitch)};
  const right={x:Math.cos(yaw),y:0,z:-Math.sin(yaw)};
  if(dir==="forward"){cam.x+=forward.x*step;cam.y+=forward.y*step;cam.z+=forward.z*step;}
  if(dir==="back"){cam.x-=forward.x*step;cam.y-=forward.y*step;cam.z-=forward.z*step;}
  if(dir==="right"){cam.x+=right.x*step;cam.z+=right.z*step;}
  if(dir==="left"){cam.x-=right.x*step;cam.z-=right.z*step;}
}

canvas.addEventListener("mousedown",e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener("mouseup",()=>dragging=false);
window.addEventListener("mousemove",e=>{
  if(!dragging)return;
  const dx=e.clientX-lastX,dy=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;
  yaw+=dx*.006; pitch+=dy*.006; pitch=Math.max(-1.35,Math.min(1.35,pitch));
});

// Touch操作：1本指で回転・視線変更
canvas.addEventListener("touchstart", e=>{
  if(e.touches.length===1){
    dragging=true;
    lastX=e.touches[0].clientX;
    lastY=e.touches[0].clientY;
  }
},{passive:true});
canvas.addEventListener("touchmove", e=>{
  if(!dragging || e.touches.length!==1) return;
  const dx=e.touches[0].clientX-lastX;
  const dy=e.touches[0].clientY-lastY;
  lastX=e.touches[0].clientX;
  lastY=e.touches[0].clientY;
  yaw+=dx*.006;
  pitch+=dy*.006;
  pitch=Math.max(-1.35,Math.min(1.35,pitch));
},{passive:true});
canvas.addEventListener("touchend", ()=>{dragging=false;},{passive:true});

canvas.addEventListener("wheel",e=>{
  e.preventDefault(); zoom*=e.deltaY<0?1.08:.92; zoom=Math.max(.6,Math.min(1.8,zoom));
  $("zoomRange").value=Math.round(zoom*100); $("zoomText").textContent=Math.round(zoom*100)+"%";
},{passive:false});
window.addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;});
window.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;});

function setHeld(button,val){const dir=button.dataset.move;heldButtons[dir]=val;button.classList.toggle("pressed",val);if(val&&mode!=="walk")setMode("walk");}
document.querySelectorAll("[data-move]").forEach(b=>{
  b.addEventListener("mousedown",()=>setHeld(b,true));
  b.addEventListener("mouseup",()=>setHeld(b,false));
  b.addEventListener("mouseleave",()=>setHeld(b,false));
  b.addEventListener("touchstart",e=>{e.preventDefault();setHeld(b,true)},{passive:false});
  b.addEventListener("touchend",e=>{e.preventDefault();setHeld(b,false)},{passive:false});
});
$("cubeMode").onclick=()=>setMode("cube");
$("walkMode").onclick=()=>setMode("walk");
$("resetView").onclick=()=>resetView();
$("autoForward").onclick=()=>{if(mode!=="walk")setMode("walk");auto=!auto;$("autoForward").classList.toggle("active",auto);}
$("zoomRange").oninput=e=>{zoom=Number(e.target.value)/100;$("zoomText").textContent=Math.round(zoom*100)+"%";}
$("speedRange").oninput=e=>{autoSpeed=Number(e.target.value);$("speedText").textContent=["かなりゆっくり","ゆっくり","標準","速め","かなり速め"][autoSpeed-1];}
["showBonds","showBox","showLabels","fadeFar"].forEach(id=>$(id).onchange=()=>updateText());

function loop(){
  if(mode==="cube" && shareFocus) shareSpin+=.018;
  if(mode==="walk"){
    const sp=movementSpeed();
    if(keys["w"]||keys["arrowup"]||heldButtons.forward)move("forward",sp);
    if(keys["s"]||keys["arrowdown"]||heldButtons.back)move("back",sp);
    if(keys["a"]||keys["arrowleft"]||heldButtons.left)move("left",sp);
    if(keys["d"]||keys["arrowright"]||heldButtons.right)move("right",sp);
    if(auto)move("forward",.007+autoSpeed*.004);
  }
  draw(); updateText(); requestAnimationFrame(loop);
}

window.addEventListener("resize",resize);

window.addEventListener("orientationchange", ()=>{
  setTimeout(resize, 250);
});

buildButtons();buildShareButtons();resetView();resize();updateText();loop();
</script>
</body>
</html>
